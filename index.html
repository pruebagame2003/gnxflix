<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GNXFLIX - Streaming</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #141414; color: #fff; font-family: 'Open Sans', sans-serif; margin: 0; padding: 0; }
        
        /* Preloader con Mensaje */
        #preloader { position: fixed; top:0; left:0; width:100vw; height:100vh; background:#141414; z-index:99999; display:flex; flex-direction:column; justify-content:center; align-items:center; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.1); border-top: 5px solid #E50914; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .support-msg { background:#1c1c1c; padding:30px; border:1px solid #E50914; border-radius:10px; box-shadow: 0 0 20px #E50914; text-align:center; margin-top:20px; }
        
        /* Logo con sombra y contorno */
        .logo { font-family: 'Fredoka One', sans-serif; font-size: 32px; font-weight: bold; color: #fff; text-transform: uppercase; 
                text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 3px 3px 0px rgba(0,0,0,0.5); }
        .logo span { color: #E50914; }

        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 4%; position: absolute; width: 92%; z-index: 10; }
        .nav-right { display: flex; align-items: center; gap: 15px; }
        .search-input { background: rgba(0,0,0,0.6); border: 1px solid #444; color: #fff; padding: 8px 15px; border-radius: 20px; outline: none; }

        /* Banner con difuminado aumentado al 50% */
        .banner-container { 
            height: 70vh; 
            background: url('https://image.tmdb.org/t/p/original/sDTnMOJ3H5wI38OxObmCtK7wfd5.jpg') center 40%/cover no-repeat; 
            display: flex; flex-direction: column; justify-content: flex-end; padding: 0 4% 80px 4%; 
            position: relative;
        }
        .banner-container::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 30%; background: linear-gradient(to bottom, #141414, transparent); }
        .banner-container::after { content: ""; position: absolute; bottom: 0; left: 0; width: 100%; height: 60%; background: linear-gradient(to top, #141414, transparent); }
        .banner-container h1 { font-family: 'Fredoka One', sans-serif; font-size: 50px; margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); z-index: 2; position: relative; }

        .category-filter-nav { display: flex; gap: 15px; justify-content: center; padding: 20px 4%; background-color: #141414; }
        .filter-btn { background: #222; color: #fff; border: 1px solid #444; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }

        .content-row { margin: 40px 4%; }
        .cards-container { display: flex; gap: 20px; margin-top: 20px; }
        .video-card { min-width: 150px; height: 220px; background: #333; border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.3s; }
        .video-card img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="preloader">
        <div class="spinner"></div>
        <div class="support-msg">
            <p>Esta plataforma se encuentra en mantenimiento técnico.</p>
            <button onclick="document.getElementById('preloader').style.display='none'" style="padding:10px 20px; cursor:pointer;">Cerrar ventana</button>
        </div>
    </div>

    <header>
        <div class="logo">GNX<span>FLIX</span></div>
        <div class="nav-right">
            <input type="text" class="search-input" placeholder="Buscar película o serie...">
            <div>🎬</div>
        </div>
    </header>

    <div class="banner-container">
        <h1>Monstruos S.A.</h1>
    </div>

    <div class="category-filter-nav">
        <button class="filter-btn">🎯 Películas Recomendadas</button>
        <button class="filter-btn">👶 Sección Kids</button>
        <button class="filter-btn">🍿 Películas Animadas</button>
        <button class="filter-btn">🎭 Películas Comedia</button>
        <button class="filter-btn">📂 Maratón Animada</button>
    </div>

    <div class="content-row">
        <h2>Películas Recomendadas</h2>
        <div class="cards-container">
            <div class="video-card"><img src="https://image.tmdb.org/t/p/original/7g3SGUY7ym4D7RxErzqlseq5wwM.jpg" alt="Doraemon"></div>
            <div class="video-card"><img src="https://image.tmdb.org/t/p/original/8p6cxOT2044sQNvqH2fCv0u8HsV.jpg" alt="Scary Movie"></div>
        </div>
    </div>

</body>
</html>
