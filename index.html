<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GNXFLIX - Mi Biblioteca de Streaming</title>

    <!-- CONFIGURACIÓN DE ICONO PERSONALIZADO (BRANDING GNXFLIX) -->
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="apple-touch-icon-precomposed" href="logo.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <!-- MOTOR DE VIDEO AVANZADO PARA LLAMADOS .M3U8 -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        /* Estilo base Dark Premium */
        body {
            background-color: #141414;
            color: #ffffff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Barra de Navegación */
        header {
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 4%;
            position: fixed;
            width: 92%;
            top: 0;
            z-index: 10;
        }
        .logo {
            color: #E50914;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* CONTENEDOR NUEVO PARA EL CARRUSEL DEL BANNER */
        .banner-container {
            position: relative;
            height: 60vh;
            width: 100%;
            overflow: hidden;
        }
        .banner {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 0 4% 60px 4%;
            box-sizing: border-box;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            z-index: 1;
        }
        .banner.active {
            opacity: 1;
            z-index: 2;
        }
        /* Degradado oscuro inferior integrado en cada banner */
        .banner::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(20,20,20,0) 40%, #141414 100%);
            z-index: -1;
        }
        .banner h1 { 
            font-size: 42px; 
            margin-bottom: 10px; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8); 
            z-index: 3;
        }

        /* INDICADORES PREMIUM ESTILO FORTNITE / EPIC GAMES (PÍLDORAS) */
        .carousel-dots {
            position: absolute;
            bottom: 25px;
            left: 4%;
            display: flex;
            gap: 8px;
            z-index: 10;
        }
        .dot {
            width: 10px;
            height: 10px;
            background-color: rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        /* La píldora activa se estira dinámicamente */
        .dot.active {
            width: 35px;
            background-color: #ffffff;
            box-shadow: 0 0 8px rgba(255,255,255,0.6);
        }

        /* Filas y Contenedores */
        .content-row { margin: 30px 0 0 4%; }
        .content-row h2 { font-size: 20px; margin-bottom: 15px; font-weight: bold; }
        .cards-container {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 15px;
            scrollbar-width: none;
        }
        .cards-container::-webkit-scrollbar { display: none; }

        /* Tarjetas de Videos */
        .video-card {
            min-width: 140px;
            max-width: 140px;
            height: 210px;
            background-color: #222;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
            cursor: pointer;
        }
        .video-card:hover { transform: scale(1.05); }
        .video-card img { width: 100%; height: 100%; object-fit: cover; }

        /* --- VENTANA DE DETALLES ADAPTATIVA (MOBILE FRIENDLY) --- */
        .details-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px);
            z-index: 999;
            justify-content: center;
            align-items: center;
            overflow-y: auto; /* Permite scroll si la pantalla es muy pequeña */
        }
        .details-container {
            background-color: #181818;
            width: 85%;
            max-width: 800px;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9);
            border: 1px solid #282828;
            display: flex;
            flex-direction: column;
        }
        .details-banner {
            height: 250px;
            background-size: cover;
            background-position: center;
            position: relative;
            width: 100%;
        }
        .details-banner::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, #181818 5%, rgba(24,24,24,0) 100%);
        }
        .close-details {
            position: absolute;
            top: 15px; right: 15px;
            background: rgba(0,0,0,0.8);
            color: #fff; border: 1px solid #444;
            width: 38px; height: 38px;
            border-radius: 50%; font-size: 18px;
            cursor: pointer; z-index: 15;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .details-content {
            padding: 30px;
            display: flex;
            gap: 25px;
        }
        .details-poster {
            min-width: 150px;
            max-width: 150px;
            height: 225px;
            border-radius: 6px;
            object-fit: cover;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-top: -100px;
            z-index: 2;
        }
        .details-info { flex: 1; margin-top: -30px; }
        .details-info h2 { font-size: 28px; margin: 0 0 10px 0; }
        .details-info p { color: #cccccc; font-size: 14px; line-height: 1.5; margin-bottom: 25px; }
        
        /* Botones de acción organizados */
        .btn-group { display: flex; gap: 12px; flex-wrap: wrap; }
        .btn {
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex: 1;
            min-width: 140px;
        }
        .btn-play { background-color: #ffffff; color: #000000; }
        .btn-play:hover { background-color: #e6e6e6; }
        .btn-trailer { background-color: #5a5a5a; color: #ffffff; }
        .btn-trailer:hover { background-color: #444444; }

        /* --- REPRODUCTORES FINALES --- */
        .player-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .player-modal iframe, .player-modal video {
            width: 100%; height: 100%; border: none; background: #000;
        }
        .back-btn {
            position: absolute;
            top: 25px; left: 25px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff; border: 1px solid #444;
            padding: 12px 20px; font-size: 14px;
            border-radius: 30px; font-weight: bold;
            cursor: pointer; z-index: 10005;
        }

        /* --- DISEÑO RESPONSIVO EXCLUSIVO PARA MÓVILES (CSS MEDIA QUERIES) --- */
        @media (max-width: 650px) {
            .banner-container { height: 45vh; }
            .banner h1 { font-size: 26px; }
            
            .details-container {
                width: 90%;
                margin: 10px auto;
            }
            .details-banner {
                height: 160px;
            }
            /* Pasamos la caja de horizontal a vertical */
            .details-content {
                flex-direction: column;
                align-items: center;
                text-align: center;
                padding: 20px;
                gap: 15px;
            }
            .details-poster {
                margin-top: -70px;
                min-width: 120px;
                max-width: 120px;
                height: 180px;
                margin-bottom: 5px;
            }
            .details-info {
                margin-top: 0;
                width: 100%;
            }
            .details-info h2 {
                font-size: 22px;
            }
            .details-info p {
                font-size: 13px;
                line-height: 1.4;
                margin-bottom: 20px;
            }
            /* Botones centrados y ocupando todo el ancho */
            .btn-group {
                justify-content: center;
                width: 100%;
            }
            .btn {
                width: 100%;
                flex: none;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">GNXFLIX</div>
    </header>

    <!-- BANNER ROTATIVO INTERACTIVO CON TUS ENLACES ULTRA HD -->
    <div class="banner-container">
        <!-- Fondo 1: Super Mario Bros -->
        <div class="banner active" style="background-image: url('https://image.tmdb.org/t/p/original/dBkvawTlvciUvW7jmNAtuvhdtdr.jpg');">
            <h1>Super Mario Bros: Movie</h1>
        </div>
        <!-- Fondo 2: Toy Story -->
        <div class="banner" style="background-image: url('https://image.tmdb.org/t/p/original/lxD5ak7BOoinRNehOCA85CQ8ubr.jpg');">
            <h1>Toy Story</h1>
        </div>
        <!-- Fondo 3: Los Minions -->
        <div class="banner" style="background-image: url('https://image.tmdb.org/t/p/original/iNhdomHWakdQbrE8oFfD4dzA7WF.jpg');">
            <h1>Los Minions</h1>
        </div>
        <!-- Fondo 4: Stand by Me Doraemon -->
        <div class="banner" style="background-image: url('https://image.tmdb.org/t/p/original/1aABIiqBY7yoQESE8qWvR0w9bJZ.jpg');">
            <h1>Stand by Me Doraemon</h1>
        </div>

        <!-- BARRITAS INDICADORAS ESTILO FORTNITE -->
        <div class="carousel-dots">
            <div class="dot active" onclick="changeBanner(0)"></div>
            <div class="dot" onclick="changeBanner(1)"></div>
            <div class="dot" onclick="changeBanner(2)"></div>
            <div class="dot" onclick="changeBanner(3)"></div>
        </div>
    </div>

    <!-- Catálogo Principal -->
    <div class="content-row">
        <h2>Películas Recomendadas</h2>
        <div class="cards-container">
            
            <!-- TARJETA 1: MARIO BROS (URL DEL REPRODUCTOR CON IFRAME DE CUEVANA CONFIGURADO) -->
            <div class="video-card" onclick="openDetails(
                'Super Mario Bros. La Película', 
                'Mientras trabajan en el subsuelo para reparar una tubería principal, los fontaneros de Brooklyn, Mario y su hermano Luigi, son transportados por una tubería misteriosa a un nuevo mundo mágico. Cuando los hermanos se separan, Mario se embarca en una pfica búsqueda para encontrar a Luigi.',
                'https://image.tmdb.org/t/p/original/4CDkQMpNDTtVKwS0BBZw5RIXDtY.jpg', 
                'https://image.tmdb.org/t/p/original/dBkvawTlvciUvW7jmNAtuvhdtdr.jpg',
                'https://www.youtube.com/embed/DmCZoiCp5C0',
                'https://tungtungsahur.cuevana3.you/?token=1UlMCCVhFCRRcRlhI&apl=0&pops=true'
            )">
                <img src="https://image.tmdb.org/t/p/original/4CDkQMpNDTtVKwS0BBZw5RIXDtY.jpg" alt="Super Mario Bros">
            </div>

            <!-- TARJETA 2: LOS MINIONS (ACTUALIZADA CON ENLACE MP4 PURO Y SEGURO) -->
            <div class="video-card" onclick="openDetails(
                'Los Minions', 
                'Los Minions empiezan una aventura en los años 60 para encontrar un nuevo amo malvado al cual servir, cruzándose en el camino con la súper villana Scarlet Overkill.',
                'https://image.tmdb.org/t/p/original/94f9xnuBMNgEZXIOjzShThuLUGH.jpg', 
                'https://image.tmdb.org/t/p/original/iNhdomHWakdQbrE8oFfD4dzA7WF.jpg',
                'https://www.youtube.com/embed/P9-FCC6I7uM',
                'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/Sintel.mp4'
            )">
                <img src="https://image.tmdb.org/t/p/original/94f9xnuBMNgEZXIOjzShThuLUGH.jpg" alt="Los Minions">
            </div>

            <!-- TARJETA 3: TOY STORY -->
            <div class="video-card" onclick="openDetails(
                'Toy Story', 
                'Los juguetes de Andy toman vida propia cuando él no está en la habitación. Liderados por Woody, se enfrentarán a la llegada de Buzz Lightyear, un moderno guardián espacial.',
                'https://image.tmdb.org/t/p/original/jvn7wy3RSNEXnFSXLpH2of2LcV6.jpg', 
                'https://image.tmdb.org/t/p/original/lxD5ak7BOoinRNehOCA85CQ8ubr.jpg',
                'https://www.youtube.com/embed/wzXG7Vf7_3U',
                'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4'
            )">
                <img src="https://image.tmdb.org/t/p/original/jvn7wy3RSNEXnFSXLpH2of2LcV6.jpg" alt="Toy Story">
            </div>

            <!-- TARJETA 4: STAND BY ME DORAEMON -->
            <div class="video-card" onclick="openDetails(
                'Stand by Me Doraemon', 
                'Nobita Nobi es un niño bastante patoso al que las cosas le salen bastante mal. Para ayudarlo, viaja desde el futuro Doraemon, un gato robot con un bolsillo repleto de inventos asombrosos.',
                'https://image.tmdb.org/t/p/original/7g3SGUY7ym4D7RxErzqlseq5wwM.jpg', 
                'https://image.tmdb.org/t/p/original/1aABIiqBY7yoQESE8qWvR0w9bJZ.jpg',
                'https://www.youtube.com/embed/vOidR_C06kU',
                'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4'
            )">
                <img src="https://image.tmdb.org/t/p/original/7g3SGUY7ym4D7RxErzqlseq5wwM.jpg" alt="Doraemon">
            </div>

        </div>
    </div>

    <!-- PANTALLA DE DETALLES (ESTILO NETFLIX) -->
    <div class="details-modal" id="detailsModal">
        <div class="details-container">
            <button class="close-details" onclick="closeDetails()">✕</button>
            <div class="details-banner" id="modalBg"></div>
            <div class="details-content">
                <img src="" class="details-poster" id="modalPoster">
                <div class="details-info">
                    <h2 id="modalTitle">Título</h2>
                    <p id="modalDescription">Descripción...</p>
                    <div class="btn-group">
                        <button class="btn btn-play" id="btnMovieAction">▶ Ver Película</button>
                        <button class="btn btn-trailer" id="btnTrailerAction">🎬 Ver Tráiler</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- PANTALLA FINAL DEL REPRODUCTOR -->
    <div class="player-modal" id="playerModal">
        <button class="back-btn" onclick="closePlayer()">✕ Volver a Detalles</button>
        <div style="width:100%; height:100%;" id="playerTarget"></div>
    </div>

    <script>
        // LÓGICA INTEGRADRA DEL CARRUSEL DE BANNERS
        const banners = document.querySelectorAll('.banner');
        const dots = document.querySelectorAll('.dot');
        let currentIndex = 0;
        let carouselInterval = setInterval(nextBanner, 6000);

        function showBanner(index) {
            banners.forEach(b => b.classList.remove('active'));
            dots.forEach(d => d.classList.remove('active'));
            
            banners[index].classList.add('active');
            dots[index].classList.add('active');
            currentIndex = index;
        }

        function nextBanner() {
            let nextIndex = (currentIndex + 1) % banners.length;
            showBanner(nextIndex);
        }

        function changeBanner(index) {
            clearInterval(carouselInterval);
            showBanner(index);
            carouselInterval = setInterval(nextBanner, 6000);
        }

        // LÓGICA DE VENTANAS DE DETALLES Y REPRODUCCIÓN
        const detailsModal = document.getElementById('detailsModal');
        const playerModal = document.getElementById('playerModal');
        const playerTarget = document.getElementById('playerTarget');

        let currentTrailerUrl = "";
        let currentMovieUrl = "";

        function openDetails(title, desc, poster, backdrop, trailerUrl, movieUrl) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalDescription').innerText = desc;
            document.getElementById('modalPoster').src = poster;
            document.getElementById('modalBg').style.backgroundImage = `url('${backdrop}')`;
            
            currentTrailerUrl = trailerUrl;
            currentMovieUrl = movieUrl;

            document.getElementById('btnTrailerAction').onclick = () => launchStream(currentTrailerUrl, true);
            document.getElementById('btnMovieAction').onclick = () => launchStream(currentMovieUrl, false);

            detailsModal.style.display = 'flex';
        }

        function closeDetails() {
            detailsModal.style.display = 'none';
        }

        // LÓGICA INTELIGENTE DETECTORA DE IFRAMES EXTERNOS (CUEVANA)
        function launchStream(url, isTrailer) {
            playerTarget.innerHTML = ""; // Limpiar reproductor previo

            if (isTrailer || url.includes('embed') || url.includes('token=') || url.includes('cuevana3') || url.includes('you/')) {
                // Modo Iframe Estándar (Cuevana)
                playerTarget.innerHTML = `<iframe src="${url}" allow="autoplay; fullscreen" allowfullscreen style="width:100%; height:100%; border:none;"></iframe>`;
            } else if (url.includes('.m3u8')) {
                // Modo Streaming Avanzado HLS
                const videoElement = document.createElement('video');
                videoElement.controls = true;
                videoElement.autoplay = true;
                videoElement.style.width = '100%';
                videoElement.style.height = '100%';
                playerTarget.appendChild(videoElement);

                if (Hls.isSupported()) {
                    const hls = new Hls();
                    hls.loadSource(url);
                    hls.attachMedia(videoElement);
                } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                    videoElement.src = url;
                }
            } else {
                // Modo Video Directo Local / Nube (.mp4 plano)
                // Forzamos "controls" y "playsinline" para asegurar el reproductor nativo del celular con barra de pausa y pantalla completa reales
                playerTarget.innerHTML = `<video src="${url}" controls autoplay playsinline style="width:100%; height:100%; background-color:#000;"></video>`;
            }
            playerModal.style.display = 'flex';
        }

        function closePlayer() {
            playerTarget.innerHTML = "";
            playerModal.style.display = 'none';
        }
    </script>
</body>
</html>
