<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GNXFLIX - Streaming</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #141414; color: #fff; font-family: 'Open Sans', sans-serif; margin: 0; padding: 0; }
        
        #preloader { position: fixed; top:0; left:0; width:100vw; height:100vh; background:#141414; z-index:99999; display:flex; flex-direction:column; justify-content:center; align-items:center; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.1); border-top: 5px solid #E50914; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .support-msg { display: none; background:#1c1c1c; padding:30px; border:1px solid #E50914; border-radius:10px; box-shadow: 0 0 20px #E50914; text-align:center; margin-top:20px; }
        
        .logo { font-family: 'Fredoka One', sans-serif; font-size: 32px; font-weight: bold; color: #fff; text-transform: uppercase; text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 3px 3px 0px rgba(0,0,0,0.5); }
        .logo span { color: #E50914; }

        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 4%; position: absolute; width: 92%; z-index: 10; }
        .banner-container { height: 70vh; background: url('https://image.tmdb.org/t/p/original/sDTnMOJ3H5wI38OxObmCtK7wfd5.jpg') center 40%/cover no-repeat; display: flex; flex-direction: column; justify-content: flex-end; padding: 0 4% 80px 4%; position: relative; }
        .banner-container::after { content: ""; position: absolute; bottom: 0; left: 0; width: 100%; height: 60%; background: linear-gradient(to top, #141414, transparent); }
        .banner-container h1 { font-family: 'Fredoka One', sans-serif; font-size: 50px; margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); z-index: 2; position: relative; }

        .category-filter-nav { display: flex; gap: 15px; justify-content: center; padding: 20px 4%; background-color: #141414; }
        .filter-btn { background: #222; color: #fff; border: 1px solid #444; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }

        /* MODAL */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); backdrop-filter:blur(5px); z-index:10000; justify-content:center; align-items:center; }
        .modal-content { background:#181818; width:90%; max-width:600px; padding:20px; border-radius:10px; position:relative; }
        .modal-banner { width:100%; height:200px; background-size:cover; background-position:center; border-radius:5px; }
        .btn-group { display:flex; gap:10px; margin-top:20px; }
        .btn { padding:10px 20px; border:none; border-radius:5px; cursor:pointer; font-weight:bold; }
    </style>
</head>
<body>

    <div id="preloader">
        <div class="spinner"></div>
        <div class="support-msg" id="supportMsg">
            <p>Plataforma en mantenimiento técnico.</p>
            <button onclick="document.getElementById('preloader').style.display='none'" style="padding:10px 20px; cursor:pointer;">Cerrar</button>
        </div>
    </div>

    <header>
        <div class="logo">GNX<span>FLIX</span></div>
    </header>

    <div class="banner-container"><h1>Monstruos S.A.</h1></div>

    <div class="category-filter-nav">
        <button class="filter-btn">🎯 Películas Recomendadas</button>
    </div>

    <div class="content-row" style="margin: 40px 4%;">
        <h2>Películas Recomendadas</h2>
        <div class="cards-container" style="display:flex; gap:20px;">
            <div class="video-card" style="width:150px; height:220px; cursor:pointer;" onclick="openModal('Stand by Me Doraemon', 'Nobita Nobi es un niño muy patoso...', 'https://image.tmdb.org/t/p/original/7g3SGUY7ym4D7RxErzqlseq5wwM.jpg', 'https://image.tmdb.org/t/p/original/1aABIiqBY7yoQESE8qWvR0w9bJZ.jpg', 'https://www.dropbox.com/scl/fi/bqa0disi08xd2drx61rj6/DORAEMON-QUEDATE-CONMIGO.mp4?rlkey=jtkkb5xv4g3b66g0l76dllvh7&st=qc4jgece&dl=1', 'https://youtu.be/W3p3mOcim40')">
                <img src="https://image.tmdb.org/t/p/original/7g3SGUY7ym4D7RxErzqlseq5wwM.jpg" style="width:100%; border-radius:8px;">
            </div>
        </div>
    </div>

    <div id="movieModal" class="modal">
        <div class="modal-content">
            <div id="mBanner" class="modal-banner"></div>
            <h2 id="mTitle"></h2>
            <p id="mDesc"></p>
            <div class="btn-group">
                <button class="btn" onclick="window.open(currentUrl)">▶ Ver Película</button>
                <button class="btn" onclick="window.open(currentTrailer)">🍿 Ver Trailer</button>
            </div>
            <button onclick="document.getElementById('movieModal').style.display='none'" style="margin-top:10px;">Cerrar</button>
        </div>
    </div>

    <script>
        let currentUrl = '';
        let currentTrailer = '';
        function openModal(t, d, p, b, url, trailer) {
            currentUrl = url;
            currentTrailer = trailer;
            document.getElementById('mTitle').innerText = t;
            document.getElementById('mDesc').innerText = d;
            document.getElementById('mBanner').style.backgroundImage = `url('${b}')`;
            document.getElementById('movieModal').style.display = 'flex';
        }
        window.addEventListener('load', () => { setTimeout(() => { document.querySelector('.spinner').style.display='none'; document.getElementById('supportMsg').style.display='block'; }, 1500); });
    </script>
</body>
</html>
