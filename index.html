<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GNXFLIX - Streaming</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #141414; color: #fff; font-family: 'Open Sans', sans-serif; margin: 0; padding: 0; }
        
        /* Header */
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 4%; position: absolute; width: 92%; z-index: 10; }
        .logo { font-family: 'Fredoka One', sans-serif; font-size: 32px; font-weight: bold; color: #fff; text-transform: uppercase; }
        .logo span { color: #E50914; }
        .nav-right { display: flex; align-items: center; gap: 15px; }
        .search-input { background: rgba(0,0,0,0.6); border: 1px solid #444; color: #fff; padding: 8px 15px; border-radius: 20px; outline: none; }

        /* Banner ajustado */
        .banner-container { 
            height: 90vh; /* Ajustado para que se vea más el cuerpo de los monstruos */
            background: url('https://image.tmdb.org/t/p/original/sDTnMOJ3H5wI38OxObmCtK7wfd5.jpg') center/cover no-repeat; 
            display: flex; flex-direction: column; justify-content: flex-end; padding: 0 4% 50px 4%; 
            position: relative;
        }
        /* Difuminado oscuro al final del banner */
        .banner-container::after {
            content: "";
            position: absolute; bottom: 0; left: 0; width: 100%; height: 30%;
            background: linear-gradient(transparent, #141414);
        }
        .banner-container h1 { font-family: 'Fredoka One', sans-serif; font-size: 50px; margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); z-index: 2; }

        /* Botones integrados en el banner */
        .category-filter-nav { display: flex; gap: 15px; margin-top: 20px; z-index: 2; }
        .filter-btn { background: rgba(0,0,0,0.5); color: #fff; border: 1px solid #fff; padding: 8px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }

        /* Filas */
        .content-row { margin: 0 4% 40px 4%; }
        .cards-container { display: flex; gap: 20px; margin-top: 20px; }
        .video-card { min-width: 150px; height: 220px; background: #333; border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.3s; }
        .video-card img { width: 100%; height: 100%; object-fit: cover; }
        .video-card:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <header>
        <div class="logo">GNX<span>FLIX</span></div>
        <div class="nav-right">
            <input type="text" class="search-input" placeholder="Buscar película o serie...">
            <div>🎬</div>
        </div>
    </header>

    <div class="banner-container">
        <h1>Monstruos S.A.</h1>
        <div class="category-filter-nav">
            <button class="filter-btn">🎯 Películas Recomendadas</button>
            <button class="filter-btn">👶 Sección Kids</button>
            <button class="filter-btn">🍿 Películas Animadas</button>
            <button class="filter-btn">🎭 Películas Comedia</button>
            <button class="filter-btn">📂 Maratón Animada</button>
        </div>
    </div>

    <div class="content-row" id="recRow">
        <h2>Películas Recomendadas</h2>
        <div class="cards-container">
            <div class="video-card"><img src="https://image.tmdb.org/t/p/original/7g3SGUY7ym4D7RxErzqlseq5wwM.jpg" alt="Doraemon"></div>
            <div class="video-card"><img src="https://image.tmdb.org/t/p/original/8p6cxOT2044sQNvqH2fCv0u8HsV.jpg" alt="Scary Movie"></div>
        </div>
    </div>

</body>
</html>
