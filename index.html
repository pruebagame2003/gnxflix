<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GNXFLIX - Streaming</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #141414; color: #fff; font-family: 'Open Sans', sans-serif; margin: 0; }
        /* Modal Minimalista */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:10000; justify-content:center; align-items:center; }
        .modal-content { background:#181818; width:80%; max-width:700px; border-radius:10px; position:relative; padding:20px; }
        .close-x { position:absolute; top:10px; right:15px; font-size:24px; cursor:pointer; color:#fff; }
        .modal-body { display:flex; gap:20px; }
        .modal-poster { width:150px; border-radius:5px; }
        .btn-group { display:flex; gap:10px; margin-top:15px; }
        /* Video Player integrado */
        .player-container { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:20000; }
    </style>
</head>
<body>

    <div class="content-row" style="margin: 40px 4%;">
        <div class="cards-container">
            <div class="video-card" onclick="openModal('Stand by Me Doraemon', 'Nobita Nobi es un niño muy patoso...', 'https://image.tmdb.org/t/p/original/7g3SGUY7ym4D7RxErzqlseq5wwM.jpg', 'https://image.tmdb.org/t/p/original/1aABIiqBY7yoQESE8qWvR0w9bJZ.jpg', 'https://www.dropbox.com/scl/fi/bqa0disi08xd2drx61rj6/DORAEMON-QUEDATE-CONMIGO.mp4?rlkey=jtkkb5xv4g3b66g0l76dllvh7&st=qc4jgece&dl=1', 'https://www.youtube.com/embed/W3p3mOcim40')">
                <img src="https://image.tmdb.org/t/p/original/7g3SGUY7ym4D7RxErzqlseq5wwM.jpg" style="width:150px; border-radius:8px;">
            </div>
        </div>
    </div>

    <div id="movieModal" class="modal">
        <div class="modal-content">
            <span class="close-x" onclick="document.getElementById('movieModal').style.display='none'">×</span>
            <div id="mBanner" style="height:200px; background-size:cover; border-radius:5px; margin-bottom:15px;"></div>
            <div class="modal-body">
                <img id="mPoster" class="modal-poster">
                <div>
                    <h2 id="mTitle"></h2>
                    <p id="mDesc"></p>
                    <div class="btn-group">
                        <button class="btn" onclick="playMedia(currentUrl, false)">▶ Ver Película</button>
                        <button class="btn" onclick="playMedia(currentTrailer, true)">🍿 Ver Trailer</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="playerBox" class="player-container">
        <span class="close-x" style="top:20px; right:40px; z-index:21000;" onclick="closePlayer()">×</span>
        <div id="videoArea" style="width:100%; height:100%;"></div>
    </div>

    <script>
        let currentUrl = '', currentTrailer = '';
        function openModal(t, d, p, b, url, trailer) {
            currentUrl = url; currentTrailer = trailer;
            document.getElementById('mTitle').innerText = t;
            document.getElementById('mDesc').innerText = d;
            document.getElementById('mPoster').src = p;
            document.getElementById('mBanner').style.backgroundImage = `url('${b}')`;
            document.getElementById('movieModal').style.display = 'flex';
        }
        function playMedia(url, isYoutube) {
            const area = document.getElementById('videoArea');
            area.innerHTML = isYoutube ? `<iframe src="${url}" width="100%" height="100%"></iframe>` : `<video src="${url}" controls autoplay width="100%" height="100%"></video>`;
            document.getElementById('playerBox').style.display = 'block';
        }
        function closePlayer() {
            document.getElementById('videoArea').innerHTML = '';
            document.getElementById('playerBox').style.display = 'none';
        }
    </script>
</body>
</html>
