<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GNXFLIX - Streaming</title>

    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="apple-touch-icon-precomposed" href="logo.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        /* Estilo base Dark Premium */
        body { background-color: #141414; color: #ffffff; font-family: 'Open Sans', Helvetica, Arial, sans-serif; margin: 0; padding: 0; overflow-x: hidden; scroll-behavior: smooth !important; }

        /* --- PANTALLA DE CARGA --- */
        #preloader { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #141414; z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.6s ease; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.1); border-top: 5px solid #E50914; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* HEADER */
        header { background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%); display: flex; justify-content: space-between; align-items: center; padding: 20px 4%; position: fixed; width: 92%; top: 0; z-index: 10; }
        .logo { font-family: 'Fredoka One', sans-serif; color: #ffffff; font-size: 32px; font-weight: bold; text-transform: uppercase; text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 2px 2px 0px #000, 4px 4px 0px #333, 6px 6px 10px rgba(0,0,0,0.8); transform: skew(-5deg); }
        .logo span { color: #E50914; }
        .search-container { display: flex; align-items: center; background-color: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px; padding: 6px 15px; margin-left: auto; margin-right: 20px; }
        .search-input { background: none; border: none; color: #fff; font-size: 14px; outline: none; width: 180px; }
        .social-nav { display: flex; gap: 12px; }
        .social-icon-btn { width: 38px; height: 38px; border-radius: 50%; background-color: rgba(0, 0, 0, 0.5); display: flex; align-items: center; justify-content: center; text-decoration: none; }

        /* BANNER */
        .banner-container { position: relative; height: 60vh; width: 100%; overflow: hidden; }
        .banner { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center 20%; opacity: 0; transition: opacity 0.8s; }
        .banner.active { opacity: 1; }

        /* CATEGORÍAS */
        .category-filter-nav { display: flex; justify-content: center; flex-wrap: wrap; gap: 12px; margin: 20px 4%; padding-bottom: 20px; }
        .filter-btn { background: #222; color: #fff; border: 1px solid #444; padding: 10px 20px; border-radius: 25px; cursor: pointer; transition: 0.3s; }
        .filter-btn:hover { border-color: #E50914; background: rgba(229, 9, 20, 0.1); }
        
        .content-row { margin: 30px 0 0 4%; }
        .content-row h2 { font-size: 20px; margin-bottom: 15px; font-weight: bold; }
        .content-row.kids-section h2 { font-family: 'Fredoka One', sans-serif; font-size: 24px; background: linear-gradient(45deg, #00f2fe, #4facfe, #ffee55); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .cards-container { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px; }
        .video-card { min-width: 140px; max-width: 140px; height: 210px; background: #222; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        .video-card:hover { transform: scale(1.05); }
        .video-card img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; }

        /* CURSORES */
        .cursor-custom-bob { cursor: url('cursor-bob.png'), auto !important; }
        .cursor-custom-peppa { cursor: url('cursor-peppa.png'), auto !important; }
        .cursor-custom-chavo { cursor: url('cursor-chavo.png'), auto !important; }
        .cursor-custom-pajaro { cursor: url('cursor-pajaro.png'), auto !important; }

        /* MODALES */
        .details-modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); z-index: 999; justify-content: center; align-items: center; overflow-y: auto; }
        .details-container { background: #181818; width: 85%; max-width: 800px; border-radius: 12px; position: relative; padding: 30px; }
        .details-banner { height: 250px; background-size: cover; background-position: center; width: 100%; margin-bottom: 20px; }
        .player-modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 9999; flex-direction: column; justify-content: center; }
    </style>
</head>
<body>
    <div id="preloader"><div class="spinner"></div></div>
    
    <header>
        <div class="logo">Gnx<span>Flix</span></div>
        <div class="search-container"><input type="text" id="gnxSearch" class="search-input" placeholder="Buscar..." onkeyup="searchStreaming(this.value)"></div>
    </header>

    <div class="category-filter-nav">
        <button class="filter-btn" onclick="scrollToSection('recRow')">🎯 Películas Recomendadas</button>
        <button class="filter-btn" onclick="scrollToSection('kidsRow')">👶 Sección Kids</button>
        <button class="filter-btn" onclick="scrollToSection('animRow')">🍿 Películas Animadas</button>
        <button class="filter-btn" onclick="scrollToSection('comRow')">🎭 Películas Comedia</button>
    </div>

    <div class="content-row" id="animRow">
        <h2>Películas Animadas</h2>
        <div class="cards-container">
            <div class="video-card" onclick="openDetails('Sing: ¡Ven y canta!', 'Buster es un koala...', 'https://image.tmdb.org/t/p/original/lW0kUtXTOVlHTVhDO2VzNBACAHX.jpg', 'https://image.tmdb.org/t/p/original/wf9C6iqY9tXG7TrQDg3E4Flgap7.jpg', 'movie', { videoUrl: 'https://www.dropbox.com/scl/fi/i29sdmevph0toaw0kcbqm/SING-1-VEN-Y-CANTA.mp4?rlkey=zeqyyfswsbfov682n4iqbe8xo&dl=1', trailerUrl: 'https://youtu.be/QrMbJyRBhP0?si=VbVtcQZm6Huu2RpL' })">
                <img src="https://image.tmdb.org/t/p/original/lW0kUtXTOVlHTVhDO2VzNBACAHX.jpg" alt="Sing">
            </div>
            <div class="video-card card-target-doraemon" onclick="openDetails('Stand by Me Doraemon', 'Nobita Nobi...', 'https://image.tmdb.org/t/p/original/7g3SGUY7ym4D7RxErzqlseq5wwM.jpg', 'https://image.tmdb.org/t/p/original/1aABIiqBY7yoQESE8qWvR0w9bJZ.jpg', 'movie', { videoUrl: 'https://www.dropbox.com/scl/fi/bqa0disi08xd2drx61rj6/DORAEMON-QUEDATE-CONMIGO.mp4?rlkey=jtkkb5xv4g3b66g0l76dllvh7&st=h902aex6&dl=1', trailerUrl: 'https://youtu.be/W3p3mOcim40?si=zd6N9_CxYBulBJco' })">
                <img src="https://image.tmdb.org/t/p/original/7g3SGUY7ym4D7RxErzqlseq5wwM.jpg" alt="Doraemon">
            </div>
        </div>
    </div>

    <div class="content-row kids-section" id="kidsRow">
        <h2>Kids</h2>
        <div class="cards-container">
            <div class="video-card card-target-pocoyo cursor-custom-bob" onclick="openDetails('Pocoyó', '...', 'https://image.tmdb.org/t/p/original/1fmaC3t96Napg7TR9SsfOX8q11X.jpg', 'https://image.tmdb.org/t/p/original/2muMwIOZ5UOozjE1jwCfvDALssm.jpg', 'series', [ { name: 'Capítulo 1', url: 'https://www.dropbox.com/scl/fi/3xp0i6r2bd97b5iyozzui/El-Museo-Secreto-de-Pocoy.mp4?rlkey=5vekwsehh4rym5gfem8tyfxqi&dl=1', time: '11 min' } ])">
                <img src="https://image.tmdb.org/t/p/original/1fmaC3t96Napg7TR9SsfOX8q11X.jpg" alt="Pocoyó">
            </div>
            <div class="video-card card-target-plim cursor-custom-peppa" onclick="openDetails('El Payaso Plim Plim', '...', 'https://image.tmdb.org/t/p/original/xsQdAkeKo4v4Lv09JnCffNdIN3H.jpg', 'https://image.tmdb.org/t/p/original/nUD6alZRMEDrOJxfR4qfCdgt1JU.jpg', 'series', [ { name: 'Capítulo 1', url: 'https://www.dropbox.com/scl/fi/phyaiv7l1bw99mta8iklb/Qu-Le-Pasa-al-Cerdito-Enoj-n_-Canciones-Infantiles-_-Plim-Plim.mp4?rlkey=jsa0kuy6ue9ghuc9wme2s1h9v&dl=1', time: '4 min' } ])">
                <img src="https://image.tmdb.org/t/p/original/xsQdAkeKo4v4Lv09JnCffNdIN3H.jpg" alt="Plim Plim">
            </div>
        </div>
    </div>

    <script>
        function openDetails(title, desc, poster, backdrop, contentType, contentData) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalPoster').src = poster;
            document.getElementById('modalBg').style.backgroundImage = `url('${backdrop}')`;
            
            // Lógica de cursores
            detailsModal.classList.remove('cursor-custom-bob', 'cursor-custom-peppa', 'cursor-custom-chavo', 'cursor-custom-pajaro');
            const lowerTitle = title.toLowerCase();
            if (lowerTitle.includes('bob') || lowerTitle.includes('pocoyo')) detailsModal.classList.add('cursor-custom-bob');
            else if (lowerTitle.includes('peppa') || lowerTitle.includes('plim')) detailsModal.classList.add('cursor-custom-peppa');
            else if (lowerTitle.includes('chavo')) detailsModal.classList.add('cursor-custom-chavo');
            else if (lowerTitle.includes('pájaro') || lowerTitle.includes('pajaro')) detailsModal.classList.add('cursor-custom-pajaro');

            // Construir botones
            modalInteractiveArea.innerHTML = contentType === 'series' ? '...' : `
                <div class="btn-group">
                    <button class="btn btn-play" onclick="launchStream('${contentData.videoUrl}')">▶ Ver Película</button>
                    <button class="btn btn-trailer" onclick="launchStream(getEmbedUrl('${contentData.trailerUrl}'))">🍿 Ver Trailer</button>
                </div>`;
            detailsModal.style.display = 'flex';
        }
        function getEmbedUrl(url) { return url.replace('youtu.be/', 'youtube.com/embed/').replace('watch?v=', 'embed/'); }
        function launchStream(url) { playerTarget.innerHTML = url.includes('youtube') ? `<iframe src="${url}" allowfullscreen style="width:100%; height:100%;"></iframe>` : `<video src="${url}" controls autoplay playsinline style="width:100%; height:100%;"></video>`; playerModal.style.display = 'flex'; }
        function closePlayer() { playerTarget.innerHTML = ""; playerModal.style.display = 'none'; }
        function closeDetails() { detailsModal.style.display = 'none'; }
        function scrollToSection(id) { document.getElementById(id).scrollIntoView({ behavior: 'smooth' }); }
        window.addEventListener('load', () => setTimeout(() => document.getElementById('preloader').style.display = 'none', 600));
    </script>
</body>
</html>
